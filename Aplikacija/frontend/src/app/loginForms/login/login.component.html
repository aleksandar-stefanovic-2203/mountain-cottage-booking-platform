<h1>Улогуј се као {{userType}}:</h1>
Корисничко име: <input type="text" [(ngModel)]="username"><br>
Лозинка: <input type="password" [(ngModel)]="password"><br>
@if(userType == 'корисник'){
    Тип корисника: 
    <select [(ngModel)]="type">
        <option>туриста</option>
        <option>власник</option>
    </select><br>
}
<button (click)="login()">Улогуј се</button><br>
<span style="color: red">{{message}}</span>
