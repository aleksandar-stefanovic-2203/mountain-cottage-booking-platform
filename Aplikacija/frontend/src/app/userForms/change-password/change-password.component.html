<h1>Промена лозинке:</h1>
Стара лозинка: <input type="password" [(ngModel)]="oldPassword"><br>
Нова лозинка: <input type="password" [(ngModel)]="newPassword"><br>
Поновите нову лозинку: <input type="password" [(ngModel)]="repeatedNewPassword"><br>
<button (click)="changePassword()">Промени лозинку</button><br>
<span style="color: red;">{{message}}</span>
